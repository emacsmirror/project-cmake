name: CI

on:
  push:
    branches:
      - master
  pull_request: {}

jobs:
  test:
    name: Test Package
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '30.1'
          - '30.2'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v1
      - uses: purcell/setup-emacs@v8.0
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake

      - name: Test
        run: |
          emacs -Q -batch -L . \
                -l project-cmake-test.el \
                -f ert-run-tests-batch-and-exit

  lint:
    name: Lint Package
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - 'snapshot'
    steps:
      - uses: actions/checkout@v1
      - uses: purcell/setup-emacs@v8.0
        with:
          version: ${{ matrix.emacs_version }}

      - name: Lint
        run: |
          emacs -Q -batch \
                --eval "(require 'package)" \
                --eval "(push '(\"melpa\" . \"https://melpa.org/packages/\") package-archives)" \
                --eval "(package-initialize)" \
                --eval "(package-refresh-contents)" \
                --eval "(package-install 'package-lint)" \
                -f package-lint-batch-and-exit \
                project-cmake.el

      - name: Byte-compile
        run: |
          emacs -Q -batch \
                --eval "(setq byte-compile-error-on-warn t)" \
                -f batch-byte-compile \
                project-cmake.el
